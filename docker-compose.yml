services:
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    env_file:
      - .env
    ports:
      - '4000:4000'
    environment:
      MONGODB_URI: mongodb://mongo:27017/project-management
    depends_on:
      - mongo
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/health/ready']
      interval: 30s
      timeout: 5s
      retries: 5
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    env_file:
      - .env
    ports:
      - '3000:3000'
    depends_on:
      server:
        condition: service_healthy
volumes:
  mongo-data:
